title: "ShangGroup CPU 集群使用手册"
subtitle: "ShangGroup CPU Cluster Handbook"
email:
description: >-
  ShangGroup 两节点 CPU SLURM 集群使用说明、硬件配置、Slurm 作业提交方法与常见问题整理。

minimal_mistakes_skin: default
search: true

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.28.0"

# 当前压缩包按 GitHub 项目仓库 HFNL-ShangGroup 配置。
# 如果你的仓库名是 username.github.io，请把 baseurl 改成空字符串：baseurl: ""
url: ""
baseurl: "/HFNL-ShangGroup"

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

lang: zh-CN
locale: "zh_CN"
timezone: "Asia/Shanghai"
date_format: "%Y年%m月%d日"

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

atom_feed:
  hide: true

author:
  name: "ShangGroup"
  avatar: "/assets/images/lab_logo.png"
  bio: "两节点 CPU SLURM 集群使用说明"
  location: "Hefei, CN"
  links:
    - label: "服务器主页"
      icon: "fa-solid fa-server"
      url: "/"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
